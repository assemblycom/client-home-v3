[tools]
node = "24"

[tasks."migration:gen"]
description = "Generate a new Drizzle migration (requires a name argument)"
run = "bun --bun drizzle-kit generate --name {{arg(name=\"migration_name\")}}"

[tasks."migration:run"]
description = "Run pending Drizzle migrations"
run = "bun --bun drizzle-kit migrate"
